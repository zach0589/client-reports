<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spot On Solutions — Client Reports</title>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1B3A5C; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .container { text-align: center; max-width: 500px; padding: 40px; }
  h1 { font-size: 2em; margin-bottom: 8px; }
  p { color: #99AABB; font-size: 1em; margin-bottom: 30px; }
  .select-wrap { position: relative; width: 100%; }
  select {
    width: 100%;
    padding: 14px 20px;
    font-size: 1.05em;
    font-weight: 600;
    font-family: inherit;
    border: 2px solid #E8B830;
    border-radius: 8px;
    background: #244E73;
    color: #fff;
    appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  select:hover, select:focus { border-color: #f0cc5e; background: #2d5f8a; }
  select option { background: #1B3A5C; color: #fff; padding: 8px; }
  select option:disabled { color: #5a7a9a; }
  .arrow { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #E8B830; font-size: 1.2em; }
  .go-btn {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 40px;
    background: #E8B830;
    color: #1B3A5C;
    border: none;
    border-radius: 8px;
    font-size: 1.05em;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .go-btn:hover { opacity: 0.85; }
  .go-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div class="container">
  <h1>Spot On Solutions</h1>
  <p>Monthly Performance Reports</p>
  <div class="select-wrap">
    <select id="clientSelect">
      <option value="" disabled selected>Select a client...</option>
      <option value="arco-electric/">Arco Electric</option>
      <option value="coastline/">Coastline Cleaning & Restoration</option>
      <option value="clean-space-environmental/" disabled>Clean Space Environmental (coming soon)</option>
      <option value="pure-air-environmental/" disabled>Pure Air Environmental (coming soon)</option>
      <option value="rainbow-restoration-shoreview/" disabled>Rainbow Restoration of Shoreview (coming soon)</option>
      <option value="stop-restoration-albuquerque/" disabled>STOP Restoration of Albuquerque (coming soon)</option>
      <option value="violand-management/" disabled>Violand Management (coming soon)</option>
      <option value="vista-hills-storage/" disabled>Vista Hills Storage (coming soon)</option>
      <option value="wylander/" disabled>Wylander (coming soon)</option>
      <option value="xtreme-mobile-shrinkwrap/" disabled>Xtreme Mobile Shrinkwrap (coming soon)</option>
    </select>
    <span class="arrow">▾</span>
  </div>
  <button class="go-btn" id="goBtn" disabled onclick="go()">View Report</button>
</div>
<script>
const sel = document.getElementById('clientSelect');
const btn = document.getElementById('goBtn');
sel.addEventListener('change', () => { btn.disabled = !sel.value; });
function go() { if (sel.value) window.location.href = sel.value; }
sel.addEventListener('dblclick', go);
sel.addEventListener('keydown', e => { if (e.key === 'Enter' && sel.value) go(); });
</script>
</body>
</html>
